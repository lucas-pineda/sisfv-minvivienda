<div class="container-fluid">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <div class="h5 mb-0">{{ board?.name || 'Tablero' }}</div>
      <div class="text-muted">{{ board?.description || 'Visor de tablero público' }}</div>
    </div>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-secondary" routerLink="/dashboard/inicio">
        Inicio
      </a>
      <button class="btn btn-outline-secondary" type="button" (click)="back()">
        Volver
      </button>
      <a class="btn btn-primary" *ngIf="board" [href]="board.url" target="_blank" rel="noopener">
        Abrir en Power BI
      </a>
    </div>
  </div>

  <div class="card shadow-sm" *ngIf="safeUrl; else notFound">
    <div class="card-body p-0">
      <iframe
        class="viewer"
        [src]="safeUrl"
        frameborder="0"
        allowfullscreen="true"
        title="Power BI"
      ></iframe>
    </div>
  </div>

  <ng-template #notFound>
    <div class="alert alert-warning mb-0">
      No se encontró el tablero solicitado.
    </div>
  </ng-template>
</div>
