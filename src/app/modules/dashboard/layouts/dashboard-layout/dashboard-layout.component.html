<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <img class="brand-logo" src="assets/img/vivienda-logo.png" alt="Vivienda" />
      </div>
      <div class="brand-flag"></div>
    </div>

    <nav class="nav flex-column px-2">
      <a class="nav-link" routerLink="/dashboard/inicio" routerLinkActive="active">
        <i class="bi bi-house-door me-2"></i>
        Inicio
      </a>
      <a class="nav-link" routerLink="/dashboard/tableros" routerLinkActive="active">
        <i class="bi bi-gear me-2"></i>
        Administración
      </a>
    </nav>
  </aside>

  <main class="content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn btn-link text-decoration-none px-2" type="button">
          <i class="bi bi-list"></i>
        </button>
        <div class="topbar-title">SISFV 1.1 - Sistema de Información del Subsidio Familiar de Vivienda</div>
      </div>

      <div class="topbar-right">
        <button class="btn btn-link text-decoration-none px-2" type="button">
          <i class="bi bi-bell"></i>
        </button>
        <button class="btn btn-link text-decoration-none px-2" type="button">
          <i class="bi bi-question-circle"></i>
        </button>
        <div class="user-dropdown">
          <button class="user-toggle" type="button" (click)="toggleUserMenu()">
            <div class="user-avatar">
              <i class="bi bi-person"></i>
            </div>
            <div class="user-meta">
              <div class="user-name">{{ session?.email || 'Usuario' }}</div>
              <div class="user-org">Ministerio de Vivienda, Ciudad y Territorio</div>
            </div>
            <i class="bi bi-chevron-down ms-2"></i>
          </button>

          <div class="dropdown-menu dropdown-menu-end" [class.show]="userMenuOpen">
            <button class="dropdown-item" type="button" (click)="logout()">
              <i class="bi bi-box-arrow-right me-2"></i>
              Salir
            </button>
          </div>
        </div>
      </div>
    </header>

    <section class="page">
      <router-outlet></router-outlet>
    </section>

    <footer class="footer">
      <div>2026 © Ministerio de Vivienda, Ciudad y Territorio</div>
      <div class="text-muted">v.5.5.3.0 — 12 de marzo de 2026</div>
    </footer>
  </main>
</div>
